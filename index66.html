<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>中科诺拉 - 橡胶地板行业专家</title>
    <meta name="description" content="中科诺拉地板，提供专业高性能橡胶地板研发与品牌运营，中科诺拉、中研诺拉、中汉诺拉三大品牌系列，满足不同场景地面材料需求。">
    <!-- 静态网站生成说明 -->
    <meta name="generator" content="Vite + React + TypeScript">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      crossorigin="anonymous"
    />
    <script type="module" crossorigin src="assets/index-DMtuahFB.js"></script>
    <link rel="stylesheet" crossorigin href="assets/index-CROoxAn3.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- 使用相对路径确保在任何静态服务器上都能正确加载 -->
    
    <!-- 简单的加载提示，避免白屏 -->
    <style>
      #loading-indicator {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f9fafb;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      }
      #loading-indicator.hidden {
        display: none;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #1E3A8A;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loading-text {
        margin-top: 20px;
        color: #1E3A8A;
        font-size: 16px;
      }
    </style>
    <div id="loading-indicator">
      <div class="spinner"></div>
      <div class="loading-text">网站加载中...</div>
    </div>
    
    <script>
      // 当页面加载完成后隐藏加载指示器
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loadingIndicator = document.getElementById('loading-indicator');
          if (loadingIndicator) {
            loadingIndicator.classList.add('hidden');
          }
        }, 500);
      });
      
      // 处理未捕获的错误，避免白屏
      window.addEventListener('error', function(e) {
        console.error('未捕获的错误:', e.error);
        const root = document.getElementById('root');
        const loadingIndicator = document.getElementById('loading-indicator');
        if (root && loadingIndicator) {
          loadingIndicator.classList.add('hidden');
          root.innerHTML = `
            <div style="
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              height: 100vh;
              text-align: center;
              padding: 20px;
              font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            ">
              <div style="font-size: 5rem; color: #F97316;">⚠️</div>
              <h2 style="color: #1F2937; margin: 20px 0;">网站加载出错</h2>
              <p style="color: #6B7280; max-width: 500px;">
                很抱歉，网站在加载过程中遇到了问题。请尝试刷新页面或稍后再访问。
              </p>
              <button onclick="location.reload()" style="
                margin-top: 20px;
                padding: 10px 20px;
                background-color: #1E3A8A;
                color: white;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-size: 16px;
              ">
                刷新页面
              </button>
            </div>
          `;
        }
      });
      
      // 处理Promise拒绝
      window.addEventListener('unhandledrejection', function(e) {
        console.error('未处理的Promise拒绝:', e.reason);
      });
    </script>
  </body>
</html>
